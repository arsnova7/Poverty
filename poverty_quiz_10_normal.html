    "q": "아동빈곤 문제를 해결하기 위해 가장 필요한 사회적 태도로 교재와 워크북에서 공통으로 강조하는 격언은 무엇인가요? [교재 10장 / 워크북]",
    "o": [
      "가난은 나라님도 구하지 못한다.",
      "한 아이를 키우려면 온 마을이 필요하다.",
      "하늘은 스스로 돕는 자를 돕는다.",
      "젊어서 고생은 사서도 한다."
    ],
    "a": 1,
    "h": "개인이나 가족의 책임이 아닌, 지역사회와 국가의 공동 책임임을 상징합니다.",
    "e": "아동빈곤은 부모의 책임으로만 돌릴 수 없는 구조적 문제이므로, 국가와 사회 공동체가 연대하여 돌봄과 복지를 보장해야 한다는 의미로 '한 아이를 키우려면 온 마을이 필요하다'를 강조합니다."
  },
  {
    "level": "중",
    "q": "최근 우리나라 전체 아동빈곤율 수치가 감소하는 추세를 보인 주요 원인으로 꼽히는 것은 무엇인가요? [교재 10장 / 잠시만요]",
    "o": [
      "아동 인구의 급격한 증가",
      "부모의 사교육비 지출 감소",
      "근로소득의 상승 및 아동수당 등 공적 이전소득의 확대",
      "중위소득 산정 기준의 하향 조정"
    ],
    "a": 2,
    "h": "가구의 일해서 번 돈이 늘고, 국가가 현금으로 지원하는 제도가 생겼기 때문입니다.",
    "e": "우리나라 아동의 상대적 빈곤율은 2015년 이후 감소 추세인데, 이는 아동 가구의 근로소득 상승과 2018년 도입된 아동수당 등 국가의 공적 이전소득이 빈곤 완화에 기여했기 때문입니다."}
        // 
    ];

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "10강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
</body>
</html>
