<!DOCTYPE html>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
    :root { --primary: #5c6ac4; --bg-gray: #f4f6f8; --success: #28a745; --danger: #dc3545; }

    .header { text-align: center; margin-bottom: 20px; }
    .quiz-box { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

</style>
</head>
<body>
<div class="container">

    */
    const quizData = [
        {"level": "하", "q": "베버리지(Beveridge) 보고서가 제시한 5가지 사회적 위험(악) 중에서 '교육'을 통해 해결해야 한다고 지적한 빈곤의 영역은 무엇인가? [교재/강의 녹음]",

  },
  {

    "o": ["귀족 자제를 위한 철학 중심의 개인 교습", "시장경제의 요구에 부응하는 기능적 노동자 양성", "모든 학생의 개별적 탁월성 극대화", "불평등을 완벽히 해소하기 위한 부의 강제 재분배"],
    "a": 1,

    "e": "자본주의 이후 교육은 귀족 중심에서 대중교육으로 확장되었으며, 시장에서 필요한 기능적 노동자를 양성하는 '노동자 양성소'의 역할을 강력하게 띠었습니다."
  },
  {
    "level": "하",
    "q": "마이클 영(Michael Young)이 풍자 소설을 통해 처음 사용한 용어로, '지능과 노력'에 의해 사회적 지위와 보상이 결정되는 것이 공정하다고 믿는 이념은 무엇인가? [강의 녹음/교재]",
    "o": ["엘리트주의(Elitism)", "능력주의(Meritocracy)", "탁월성(Excellence)", "공화주의(Republicanism)"],

  {

    "o": ["찰스 부스와 라운트리", "웹 부부(Sidney & Beatrice Webb)", "마이클 영", "더글러스 다우니"],
    "a": 1,

  {
    "level": "하",
    "q": "마이클 영이 『능력주의』 소설을 통해 능력주의의 한계로 강력하게 비판한 핵심 문제점은 무엇인가? [강의 녹음/교재]",
    "o": ["기회의 평등을 너무 완벽하게 실현하여 경쟁이 사라졌다.", "부모의 자원이나 출생 환경 등 불평등한 출발점을 은폐하고 차별을 정당화한다.", "능력 측정 방식이 너무 객관적이어서 인간미가 없다.", "하층 계급이 부유층의 일자리를 모두 빼앗게 만든다."],
    "a": 1,

    "e": "능력주의는 출발선 자체의 불평등을 간과하며, 성공을 온전히 개인의 노력으로 돌림으로써 하층 계급에 대한 도덕적 혐오와 차별(엘리트주의)을 정당화하는 수단으로 전락할 수 있음을 비판했습니다."

    "o": ["나사로형 빈민", "워킹 푸어(Working Poor)", "엘리트 계급", "프레카리아트"],
    "a": 1,
    "h": "잠시만요 요약본: '일하는 빈곤층'을 뜻하는 영어 합성어입니다.",
    "e": "워킹 푸어(Working Poor)는 일자리에는 참여하고 있으나, 저임금과 고용 불안 등으로 인해 생계유지가 어려운 근로 빈곤층을 의미합니다."
  },
  {
    "level": "하",
    "q": "비정규직, 플랫폼 노동자 등 저임금·저숙련 노동에 시달리며, 해고가 용이하고 인공지능(AI) 등에 의해 대체될 위험이 높은 새로운 '불안정 노동 계급'을 가리키는 용어는? [잠시만요 요약본/강의 녹음]",
    "o": ["프롤레타리아(Proletariat)", "워킹 푸어(Working Poor)", "프레카리아트(Precariat)", "메리토크라시(Meritocracy)"],
    "a": 2,
    "h": "잠시만요 요약본: '불안정한(precarious)'과 '무산계급(proletariat)'의 합성어입니다.",
    "e": "프레카리아트(Precariat)는 기술 발전과 노동 유연화 속에서 고용 안정성과 노동권의 보호를 받지 못하는 미래의 거대한 불안정 노동자 계급을 일컫습니다."
  },
  {
    "level": "하",
    "q": "스웨덴에서 산별노조 체계를 기반으로 기업 규모와 관계없이 '동일 노동 동일 임금'을 제도적으로 보장하여 안정적인 노동 시장을 유지하게 한 대표적인 모델은? [교재/잠시만요]",
    "o": ["오샨스키 모델", "렌-마이드너 모델(Rehn-Meidner Model)", "베버리지 모델", "아리스토텔레스 모델"],
    "a": 1,
    "h": "잠시만요 요약본: 살트셰바덴 협약과 함께 스웨덴의 연대임금 정책을 이끈 모델입니다.",
    "e": "스웨덴의 렌-마이드너 모델은 연대 임금 정책(동일 노동 동일 임금)을 통해 노동자들의 안정적 소득 보장과 불평등 완화, 시장 경쟁력 유지를 동시에 추구한 핵심 정책입니다."
  },
  {
    "level": "하",
    "q": "한나 아렌트(H. Arendt)가 현대 사회의 비인간적 경쟁 구조를 비판하며 분류한 개념 중, 개인을 '직위, 직책, 사회적 서열' 등으로 평가하는 잣대를 무엇이라 부르는가? [강의 녹음/교재]",
    "o": ["후니스적 인간(Whoness)", "왓니스적 인간(Whatness)", "탁월성(Excellence)", "복수성(Plurality)"],
    "a": 1,

  },
  {
    "level": "하",
    "q": "교육 평등의 유형 중, 성별이나 인종 등 타고난 신분적 제약 때문에 교육받지 못하던 차별을 철폐하고 '모든 사람에게 교육 참여를 법적으로 허용'한 단계를 무엇이라 하는가? [교재/강의 녹음]",
    "o": ["결과의 평등", "과정의 평등", "허용적 평등", "보장적 평등"],
    "a": 2,

  },
  {
    "level": "하",

    "o": ["명문대 입학 순위의 완전한 폐지", "의무교육 제도의 도입 및 등록금 무상 지원", "부유층 아동만을 위한 영재학교 설립", "사교육 시장의 전면 합법화"],
    "a": 1,

  {

    "q": "1968년 혁명 이후 프랑스가 교육의 사회적 차별을 철폐하기 위해 도입한 상징적인 교육 개혁 조치는 무엇인가? [교재/강의 녹음]",
    "o": ["사교육을 전면 허용하여 시장 경쟁에 맡김", "명문대의 서열을 폐지하고 1대학, 2대학 등으로 개칭하여 평준화함", "외국인 유학생의 입학을 전면 금지함", "하층 계급의 교육 권리를 헌법에서 삭제함"],

    "o": ["학교에서는 무조건 수학(대수학) 교육만을 강화해야 한다.", "학교가 대수학과 같은 학문적 지식만 우대하고, 요리나 오토바이 수리 같은 실생활 기술을 열등하게 취급하는 것은 부당하다.", "아이들은 무조건 직업 구조에 맞는 부품으로만 양성되어야 한다.", "학교 교육은 철저한 우열 평가를 통해 등급을 매겨야 한다."],
    "a": 1,

    "e": "나딩스는 학문적 지식(대수학)이 실용적 기술(요리, 수리)보다 본질적으로 더 '지적'인 것은 아니라고 지적하며, 특정 능력만을 우대하는 능력주의 교육의 편협함을 비판했습니다."

  {
    "level": "하",
    "q": "더글러스 다우니(D. Downey)가 『학교의 재발견』에서 지적한 '학교 개혁이 매번 실패하는 가장 큰 원인'은 무엇인가? [강의 녹음/교재]",
    "o": ["교사들의 전문성이 과거보다 크게 떨어졌기 때문이다.", "빈곤한 지역에 위치한 학교 시설이 너무 낡았기 때문이다.", "학교 자체가 문제가 아니라, 아이들이 겪는 학교 밖의 열악한 환경(가난)과 사회 구조적 불평등 때문이다.", "학생들이 사교육을 전혀 받지 않으려 하기 때문이다."],
    "a": 2,
    "h": "강의 녹음/교재: 실패의 진짜 원인은 아이들이 처한 구조적 현실에 있다고 보았습니다.",
    "e": "다우니는 학교 자체의 문제가 아니라 아이들이 등교하기 전 맞닥뜨리는 '학교 밖의 빈곤하고 불평등한 환경'이 학습 성과를 결정짓기 때문에, 출발선의 불평등(구조적 문제)을 해소해야 한다고 주장했습니다."
  },
  {
    "level": "하",
    "q": "학업 성취가 낮거나 소외된 아동에게 추가적인 교육복지 지원이나 보상 교육을 제공하여 실질적 격차를 줄이려는 교육 평등의 개념은? [강의 녹음/교재]",
    "o": ["허용적 평등", "보장적 평등", "과정적 평등", "결과의 평등"],
    "a": 3,
    "h": "강의 녹음/교재: 불리한 조건을 보완하여 최종 도달점의 격차를 줄이려는 목표입니다.",
    "e": "교육 '결과의 평등'은 장애, 가난 등으로 학업에 어려움을 겪는 이들에게 보상적 교육(추가 지원, 교육복지사 배치 등)을 제공하여 결과적인 학업 성취 수준을 맞춰주려는 적극적 평등 개념입니다."}
        // 
    ];

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "6강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
