    "o": ["수급 대상자의 실제 소득과 재산 규모를 정확히 파악한다.", "국가 지원 급여의 필요성 여부를 결정한다.", "수급자가 향후 부자가 될 수 있도록 재산 형성 투자 계획을 짜준다.", "개인이나 가구의 생활 유지 능력이 결여되었는지 판단한다."],

  {

    "o": ["공무원이 이웃 주민들을 탐문하며 자산조사를 철저히 하는 경우", "자신이 수급자라는 사실이 동네와 학교에 공개되어 구분되는 경우", "소득 심사 없이 특정 연령의 모든 아동이나 노인에게 수급 대상 여부가 자동으로 결정되어 지급되는 보편적 제도인 경우", "급여 수준이 극히 낮고, 구직 활동 증명서 제출 등 수급 조건이 매우 까다로운 경우"],

  {

    "o": ["수급자는 현재 법에 따라 실제로 급여를 지급받고 있는 사람을 말한다.", "수급권자는 자산 조건 등을 충족하여 급여를 받을 법적 자격이 있는 사람을 말한다.", "수급자는 자격만 충족했을 뿐 실제로 급여를 받지 않고 있는 사람을 일컫는다.", "수급권자는 자격이 충분하지만 본인이 원치 않아 수급 신청을 하지 않은 상태일 수 있다."],
    "a": 2,
    "h": "기출문제 해설: 수급자는 '실제로 받는 사람', 수급권자는 '자격이 있는 사람'입니다.",

  {

    "o": ["생활 유지가 어려운 사람에게 세금을 집중 투입하는 선별적 복지이다.", "자산조사와 상태조사를 거쳐 대상자를 엄격하게 가려낸다.", "대한민국 국민이라면 소득과 무관하게 누구에게나 동일한 금액이 지급된다.", "부족한 소득을 채워주는 보충적 소득 보장의 성격을 지닌다."],
    "a": 2,

    "o": ["통계청의 컴퓨터가 잦은 오류를 일으켜 잘못된 수치를 제공하기 때문이다.", "중앙생활보장위원회의 결정 논의 구조가 매우 폐쇄적이어서 빈곤 당사자와 시민사회가 의견을 개진하고 감시할 통로가 원천 차단되어 있기 때문이다.", "수급자들이 돈을 더 많이 주면 무조건 도박에 탕진할 것이라는 연구 결과가 입증되었기 때문이다.", "국가에 예산이 차고 넘쳐서 돈을 쓸 곳이 없기 때문이다."],
    "a": 1,
    "h": "강의 녹음 인터뷰: 결정 과정이 폐쇄적이고 당사자 목소리가 배제되는 힘의 불균형 문제입니다.",
    "e": "정 국장은 매년 기준 중위소득이 실제값과 격차를 보이는 이유가 회의록조차 비공개로 부치는 '중앙생활보장위원회'의 폐쇄적이고 일방적인 의사결정 구조와 사회적 무관심(권력의 비대칭) 탓이라고 비판합니다."
  },
  {
    "level": "상",

    "o": ["본인부담액이 진료비 총액에 비례해 수시로 변하므로 예측 불가능성이 커져, 만성질환이나 비급여 치료가 잦은 수급자들이 비용 공포로 인해 필수적인 병원 이용조차 포기하게 만들기 때문이다.", "의료급여 수급자들은 원래 돈이 매우 많아 정액제를 오히려 귀찮아하기 때문이다.", "정률제가 도입되면 수급자들이 병원비를 아예 한 푼도 안 내게 되어 대형병원이 파산하기 때문이다.", "정률제가 세계보건기구(WHO)의 금지 사항이기 때문이다."],
    "a": 0,

  {
    "level": "상",
    "q": "2010년대 이후 빈곤 단체의 장기 농성(광화문 1,842일) 등 사회적 압력으로 '부양의무자 기준'이 점진적으로 완화 및 폐지되었으나, 2025년 현재까지도 이 독소 조항이 여전히 남아있어 가장 많은 사각지대를 양산하고 있는 급여 영역은 무엇인가? [강의 녹음 심화]",
    "o": ["주거급여와 교육급여", "해산급여와 장제급여", "생계급여와 의료급여", "자활급여와 실업급여"],
    "a": 2,

  {
    "level": "상",
    "q": "복지를 노동시장으로부터의 독립, 즉 '탈상품화(De-commodification)'로 정의하는 에스핑 앤더슨(Esping-Andersen) 등의 복지국가 이념에 비추어 볼 때, 현대의 '근로 연계 복지(Workfare)'가 직면한 모순을 가장 타당하게 비판한 것은? [교재/강의 녹음 심화]",

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "8강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
