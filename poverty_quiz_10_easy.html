    "q": "아동빈곤을 측정하는 다차원적 접근에서 포함되는 주요 측정 지표 영역이 아닌 것은 무엇인가요? [교재 10장 / 잠시만요]",
    "o": [
      "건강 및 영양 상태",
      "주택 및 주거환경",
      "교육 및 양육",
      "주식 및 펀드 투자 수익률"
    ],
    "a": 3,
    "h": "아동의 일상생활, 건강, 교육과 관련된 결핍을 평가합니다.",
    "e": "다차원적 빈곤 측정에는 경제활동과 경제수준, 주택 및 주거환경, 교육 및 양육, 건강, 문화 영역이 포함됩니다. 주식 및 펀드 투자 수익률은 아동 빈곤 지표에 포함되지 않습니다."
  },
  {
    "level": "하",
    "q": "다음 중 드림스타트 사업의 대상자로 선정되는 가장 핵심적인 연령층은 누구인가요? [교재 10장 / 강의록]",
    "o": [
      "12세 이하 취약계층 아동과 가족, 임산부",
      "18세 이상의 시설 퇴소 자립 청년",
      "대학에 재학 중인 저소득층 대학생",
      "근로 능력을 상실한 65세 이상 노인"
    ],
    "a": 0,
    "h": "영유아 및 초등학생을 중심으로 초기 개입을 목표로 합니다.",
    "e": "드림스타트 사업의 주된 지원 대상은 12세 이하(임산부 포함) 취약계층 아동과 그 가족이며, 예외적으로 집중 사례관리가 필요한 13세 이상 초등 재학 아동이 포함됩니다."}
        // 
    ];

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "10강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
</body>
</html>
