    "q": "사회적 배제 현상에서 나타나는 개인적 수준의 부정적 영향에 해당하지 않는 것은? [워크북 3장]",
    "o": ["자기 정체성 상실과 우울증 등 건강 악화", "교육 기회 박탈 및 실업", "사회적 네트워크가 확대되고 연대감이 극대화됨", "인간관계 단절에 따른 심리적 고립"],
    "a": 2,
    "h": "잠시만요 요약본: 배제는 유대와 관계를 해체하는 결과를 낳습니다.",
    "e": "사회적 배제에 처한 개인은 주류 사회의 네트워크에서 밀려나 철저한 고립을 겪으며, 연대감 확대는 배제 현상과 정반대되는 긍정적 지표입니다."
  },
  {
    "level": "중",
    "q": "사회적 배제의 원인을 '거시적 요인'과 '개인적 요인'으로 구분할 때, 거시적 요인에 해당하는 것은? [워크북 3장]",
    "o": ["낮은 학력과 직업 기술 부족", "자본주의 구조 변화 및 분배 정책의 부재", "본인의 불규칙한 생활 습관", "신체적 장애로 인한 거동의 불편"],
    "a": 1,
    "h": "잠시만요 요약본: 사회 시스템 차원의 원인입니다.",
    "e": "자본주의 산업 구조의 개편, 국가 사회보장 제도의 미비 등은 개인이 통제할 수 없는 거시적 요인이며, 학력 부족이나 질병 등은 개인적 위험 요인에 속합니다."}
        // 
    ];

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "3강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
</body>
</html>
