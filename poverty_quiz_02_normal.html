    "q": "자선조직협회(COS)와 인보관 운동의 접근 방식 차이를 바르게 설명한 것은? [워크북 연습문제]",
    "o": ["자선조직협회는 구조적 원인을 해결하려 했고, 인보관은 개인의 도덕성을 강조했다.", "자선조직협회는 개인의 나태를 원인으로 보고 시혜적 자선을 펼쳤고, 인보관은 구조적 원인 해결을 위해 사회개혁을 추진했다.", "두 운동 모두 빈곤을 단순한 운명으로 수용하고 종교적 기도만을 강조했다.", "두 운동 모두 빈곤 해소를 위한 전면적인 무장 폭동을 주도했다."],
    "a": 1,
    "h": "잠시만요 요약본: 자선조직은 우애방문원 파견, 인보관은 교육받은 중산층의 거주가 특징입니다.",
    "e": "자선조직협회는 빈민 통제와 개별 자선에 초점을 맞추었으며, 인보관 운동은 지역사회에 들어가 기존 제도의 모순을 고발하고 구조적 개혁을 지향했습니다."
  },
  {
    "level": "중",
    "q": "1880년대 나타난 인보관 운동(Settlement House Movement)의 주요 참여자로, 빈민 지역에 직접 들어가 함께 생활하며 빈민을 조력한 사람들을 일컫는 용어는? [교재 2장]",
    "o": ["거주자(Resident)", "우애방문원(Friendly Visitor)", "치안판사(Justice of the Peace)", "성직자(Clergy)"],
    "a": 0,
    "h": "잠시만요 요약본: 교육받은 중류계층이 지역 사회에 들어가 함께 살았습니다.",
    "e": "인보관 운동은 대학생 등 교육받은 중산층 지식인들이 빈민가에 직접 입주하여 거주자(Resident)로서 지역사회 복지 향상과 연대를 실천했습니다."}
        // 
    ];

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "2강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
</body>
</html>
