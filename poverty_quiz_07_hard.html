    "o": ["건강 관리에 더 많은 시간과 비용을 투자하여 적극적이다.", "신체 활동 실천율(운동)이 하위 계층보다 더 높게 나타난다.", "비만율이 상대적으로 더 낮은 편이다.", "만성질환이 더 많아 건강이 나쁘며, 병원 이용이 빈곤층보다 압도적으로 매우 잦다."],

    "o": ["현대 자본주의 도시 계획이 자동차 위주여서 걷기 어렵게 만들어져 있다.", "비만은 오로지 개인의 부적절한 식습관, 나태함, 운동 부족에서 기인한 도덕적 실패이다.", "저소득층 동네에는 신선한 과일과 채소를 파는 마트가 없어 정크푸드에 의존하게 된다.", "야근과 장시간 노동으로 인해 스스로 요리할 에너지가 고갈된 상태이다."],

  {

    "o": ["집을 소유하지 못한 세입자도 쫓겨날 걱정 없이 편안하게 거주할 수 있는 사회인가에 대한 반성적 질문이다.", "주거 공간을 이윤 창출을 위한 투기적 투자(부동산 재테크) 대상으로만 보는 시장 만능주의 시각에 대한 날카로운 문제 제기이다.", "가진 돈이 부족한 서민들이 부동산 갭투자에 성공하여 부자가 될 수 있는 필승의 노하우를 전수하려는 목적이다.", "적절한 거주 환경에서 살아가는 것이 부의 크기와 무관하게 국가가 지켜주어야 할 헌법적, 세계인권선언적 기본권이라는 인식이다."],

    let curIdx = 0;
    let wrongCount = 0; // 틀린 횟수 추적 변수

    function loadQuestion() {
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === q.a) {
            // 정답을 맞춘 경우
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); // 클릭 방지
            showExplanation();
        } else {
            // 틀린 경우
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none'; // 틀린 버튼 다시 못 누르게
            
            if (wrongCount === 1) {
                // 첫 번째 틀림: 힌트만 보여줌
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                // 두 번째 틀림: 정답 공개
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                showExplanation();
            }
        }
    }

    function showExplanation() {
        const q = quizData[curIdx];
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-msg').innerText = "7강 학습을 완료하셨습니다. 수고하셨습니다, 학우님!";
        }
    }

    loadQuestion();
</script>
